name: Snake
on:
  # Se regenera todos los días a las 6:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Permite ejecutarlo manualmente
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generar snake
        uses: Platane/snk@v3
        with:
          github_user_name: PabloMarroquinnn1
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
