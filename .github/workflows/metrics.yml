name: Metrics
on:
  # Se ejecuta todos los días a las 6:00 UTC (medianoche en Guatemala)
  schedule:
    - cron: "0 6 * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # Se ejecuta cada vez que hacés push al repo
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PabloMarroquinnn1
          template: classic
          filename: metrics.svg
          config_timezone: America/Guatemala
          # Tarjeta base: header, actividad, comunidad, repos
          base: header, activity, community, repositories, metadata
          # Lenguajes más usados
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_colors: github
          # Calendario de contribuciones (últimos 6 meses)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          # Logros/trofeos estilo achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
